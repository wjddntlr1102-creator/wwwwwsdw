<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 체험단 모집 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --card: #f0f1f4;
    --border: #e0e2e9;
    --accent: #ff4d6d;
    --accent2: #ff8fa3;
    --green: #16a34a;
    --yellow: #d97706;
    --blue: #0284c7;
    --purple: #7c3aed;
    --text: #1a1a2e;
    --muted: #7c7c96;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
    }

  /* HEADER */
  .header { text-align:center; margin-bottom:36px; }
  .header::before {
    content:''; display:block; width:3px; height:50px;
    background:linear-gradient(to bottom,transparent,var(--accent));
    margin:0 auto 14px;
  }
  .header-logo { height:110px; width:auto; display:block; margin:0 auto 10px; }
  .header-title { font-family:'Noto Sans KR',sans-serif; font-size:clamp(16px,3vw,24px); font-weight:700; color:var(--text); margin-bottom:4px; }
  .header .sub { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

  /* STATS */
  .stats-bar { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:28px; }
  .stat-chip {
    background:var(--card); border:1px solid var(--border);
    border-radius:100px; padding:7px 18px;
    font-size:12px; display:flex; align-items:center; gap:7px;
  }
  .stat-chip .dot { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
  .dot-green { background:var(--green); box-shadow:0 0 6px var(--green); }
  .dot-yellow { background:var(--yellow); box-shadow:0 0 6px var(--yellow); }
  .dot-red { background:var(--accent); box-shadow:0 0 6px var(--accent); }
  .dot-blue { background:var(--blue); box-shadow:0 0 6px var(--blue); }
  .dot-orange { background:#fb923c; box-shadow:0 0 6px #fb923c; }
  .stat-chip strong { color:var(--text); font-weight:700; }
  .stat-chip span { color:var(--muted); }

  /* FILTER */
  .filter-bar { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
  .filter-btn {
    background:var(--card); border:1px solid var(--border); color:var(--muted);
    border-radius:8px; padding:6px 14px; font-size:12px;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all .15s;
  }
  .filter-btn:hover, .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* SEARCH */
  .search-wrap { max-width:320px; margin:0 auto 24px; position:relative; }
  .search-input {
    width:100%; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:9px 16px 9px 38px;
    font-size:13px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
    transition:border-color .2s;
  }
  .search-input:focus { outline:none; border-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; pointer-events:none; }

  /* BRANCH CARDS */
  .branches-grid {
    max-width:1100px; margin:0 auto;
    display:grid; gap:12px;
    grid-template-columns: 1fr;
  }

  .branch-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px; overflow:hidden;
    transition:border-color .2s, box-shadow .2s;
  }
  .branch-card:hover { border-color:rgba(255,77,109,.4); box-shadow:0 4px 24px rgba(0,0,0,.08); }
  .branch-card.hidden { display:none; }

  /* CARD HEADER */
  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; background:var(--card);
    border-bottom:1px solid var(--border);
    cursor:pointer; user-select:none;
    transition:background .15s;
  }
  .card-header:hover { background:#e8e9ef; }
  .card-header-left { display:flex; align-items:center; gap:10px; }
  .branch-idx { font-size:10px; color:var(--muted); font-weight:500; }
  .branch-name { font-size:15px; font-weight:700; }
  .card-header-right { display:flex; align-items:center; gap:10px; }

  /* PROGRESS MINI */
  .progress-mini { display:flex; align-items:center; gap:6px; }
  .mini-dots { display:flex; gap:3px; }
  .mini-dot {
    width:10px; height:10px; border-radius:3px;
    border:1.5px solid var(--border); background:transparent;
    transition:all .15s;
  }
  .mini-dot.filled { background:var(--accent); border-color:var(--accent); box-shadow:0 0 5px rgba(255,77,109,.4); }
  .mini-count { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; }

  /* BADGE */
  .badge { display:inline-block; padding:2px 9px; border-radius:100px; font-size:10px; font-weight:700; white-space:nowrap; }
  .badge-open { background:rgba(22,163,74,.1); color:var(--green); border:1px solid rgba(22,163,74,.25); }
  .badge-partial { background:rgba(217,119,6,.1); color:var(--yellow); border:1px solid rgba(217,119,6,.25); }
  .badge-full { background:rgba(255,77,109,.1); color:var(--accent); border:1px solid rgba(255,77,109,.25); }

  /* CHEVRON */
  .chevron { color:var(--muted); font-size:12px; transition:transform .25s; }
  .chevron.open { transform:rotate(180deg); }

  /* CARD BODY */
  .card-body { padding:0; max-height:0; overflow:hidden; transition:max-height .35s ease, padding .2s; }
  .card-body.open { max-height:800px; padding:16px 18px; }

  /* BLOGGER TABLE */
  .blogger-table { width:100%; border-collapse:collapse; }
  .blogger-table thead tr { border-bottom:1px solid var(--border); }
  .blogger-table th {
    font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); padding:0 8px 8px; text-align:left;
  }
  .blogger-table th:first-child { padding-left:0; width:28px; }
  .blogger-table tbody tr { border-bottom:1px solid rgba(0,0,0,.07); }
  .blogger-table tbody tr:last-child { border-bottom:none; }

  .blogger-table td { padding:8px 8px; vertical-align:top; }
  .blogger-table td:first-child { padding-left:0; }

  .team-num {
    width:22px; height:22px; border-radius:6px;
    background:var(--border); color:var(--muted);
    font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin-top:1px;
  }
  .team-num.active { background:var(--accent); color:#fff; box-shadow:0 0 8px rgba(255,77,109,.35); }

  /* INPUTS */
  .cell-input {
    background:var(--bg); border:1px solid var(--border);
    border-radius:7px; padding:6px 9px;
    font-size:12px; color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    width:100%; transition:border-color .15s;
  }
  .cell-input:focus { outline:none; border-color:var(--accent); }
  .cell-input::placeholder { color:var(--muted); font-size:11px; }
  .cell-input.date-input { cursor:pointer; }
  .cell-input.date-input::-webkit-calendar-picker-indicator { filter:opacity(.4); cursor:pointer; }

  /* DEADLINE ROW */
  .deadline-row {
    display:flex; align-items:center; gap:6px; margin-top:4px;
  }
  .deadline-label { font-size:10px; color:var(--muted); white-space:nowrap; }
  .deadline-val { font-size:11px; font-weight:600; }
  .deadline-val.ok { color:var(--green); }
  .deadline-val.warn { color:var(--yellow); }
  .deadline-val.over { color:var(--accent); }
  .deadline-val.none { color:var(--border); }

  /* LINK */
  .link-wrap { display:flex; gap:5px; align-items:center; }
  .link-btn {
    flex-shrink:0; width:26px; height:26px; border-radius:6px;
    background:var(--border); border:none; color:var(--muted);
    cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;
    text-decoration:none; transition:all .15s;
  }
  .link-btn:hover { background:var(--accent); color:#fff; }

  /* POSTING STATUS */
  .post-status-btn {
    flex-shrink:0;
    padding:3px 8px; border-radius:5px; border:none;
    font-size:10px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;
    transition:all .15s; white-space:nowrap;
  }
  .post-status-btn.none { background:var(--border); color:var(--muted); }
  .post-status-btn.posted { background:rgba(22,163,74,.12); color:var(--green); border:1px solid rgba(22,163,74,.3); }
  .post-status-btn.overdue { background:rgba(255,77,109,.1); color:var(--accent); border:1px solid rgba(255,77,109,.3); }

  /* CARD FOOTER */
  .card-footer {
    display:flex; justify-content:flex-end; align-items:center;
    padding-top:12px; border-top:1px solid var(--border);
    margin-top:12px;
  }
  .reset-btn {
    background:transparent; border:1px solid var(--border); color:var(--muted);
    border-radius:6px; padding:4px 12px; font-size:11px;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .15s;
  }
  .reset-btn:hover { border-color:var(--accent); color:var(--accent); }

  .footer { text-align:center; margin-top:40px; font-size:11px; color:var(--muted); letter-spacing:1px; }

  @media(max-width:600px) {
    body { padding:20px 12px 50px; }
    .branches-grid { grid-template-columns:1fr; }
  }

  /* JSON 공유 기능 */
  .share-bar { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
  .share-btn {
    padding:8px 18px; border-radius:8px; font-size:13px;
    font-family:'Noto Sans KR',sans-serif; font-weight:600;
    cursor:pointer; border:none; transition:all .15s;
  }
  .share-btn-save { background:#16a34a; color:#fff; }
  .share-btn-save:hover { background:#15803d; transform:translateY(-1px); }
  .share-btn-load { background:#0284c7; color:#fff; }
  .share-btn-load:hover { background:#0369a1; transform:translateY(-1px); }
  .share-btn-csv { background:#7c3aed; color:#fff; }
  .share-btn-csv:hover { background:#6d28d9; transform:translateY(-1px); }
  .info-banner {
    max-width:700px; margin:0 auto 20px;
    background:#eff6ff; border:1px solid #bfdbfe;
    border-radius:10px; padding:11px 16px;
    font-size:12px; color:#1e40af;
    display:flex; align-items:flex-start; gap:8px; line-height:1.6;
  }
  .info-banner b { color:#1d4ed8; }
  #file-input-hidden { display:none; }
  /* Toast */
  #toast {
    position:fixed; bottom:24px; right:24px;
    background:#1a1a2e; color:#fff;
    padding:10px 18px; border-radius:8px; font-size:13px;
    opacity:0; transition:opacity .25s; z-index:9999; pointer-events:none;
  }
  #toast.show { opacity:1; }
</style>
</head>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot, 
    query, 
    orderBy 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "너꺼",
    authDomain: "너꺼",
    projectId: "너꺼",
    storageBucket: "너꺼",
    messagingSenderId: "너꺼",
    appId: "너꺼"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 저장
  document.getElementById("addBtn").onclick = async () => {
    const value = document.getElementById("input").value;

    await addDoc(collection(db, "posts"), {
      text: value,
      created: Date.now()
    });

    alert("저장됨");
  };

  // 🔥 실시간 출력
  const q = query(collection(db, "posts"), orderBy("created", "desc"));

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach((doc) => {
      const div = document.createElement("div");
      div.innerText = doc.data().text;
      list.appendChild(div);
    });
  });
</script>

<script>
const branches = [
  "강남구청점","혜화점","신당점","신도림점",
  "인천구월점","연신내점","종각점",
  "방이점","한양대점","신촌점","김포구래점",
  "인천부평점","인천동암점","수유점","선릉점",
  "논현점","역삼점","범계점","사당점",
  "신림점","사가정점","청량리점","구리점",
  "천호점","연남점","성신여대점","양재점",
  "안성아양점","영등포구청점","영등포점","잠실새내점",
  "신사점","서울대입구점","문래점","양평점",
  "일산식사점","용문점","홍대점","모란점"
];

const STORAGE_KEY = 'blog_tracker_v2';
let state = {};
let openCards = new Set();
let currentFilter = 'all';

function defaultBlogger() {
  return { name:'', blog:'', phone:'', reserveDate:'', postLink:'', postStatus:'none' };
}
function defaultBranch() {
  return { bloggers: Array.from({length:5}, defaultBlogger) };
}

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) state = JSON.parse(s); } catch(e){}
  branches.forEach(b => {
    if (!state[b]) state[b] = defaultBranch();
    // ensure 5 bloggers
    while(state[b].bloggers.length < 5) state[b].bloggers.push(defaultBlogger());
    state[b].bloggers.forEach(bl => {
      if(!bl.postStatus) bl.postStatus = 'none';
    });
  });
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function isFilled(blogger) {
  return blogger.name.trim() !== '' || blogger.blog.trim() !== '';
}

function getDeadline(reserveDate) {
  if (!reserveDate) return null;
  const d = new Date(reserveDate);
  d.setDate(d.getDate() + 7);
  return d;
}

function deadlineStatus(reserveDate, postStatus) {
  if (!reserveDate) return 'none';
  if (postStatus === 'posted') return 'posted';
  const dl = getDeadline(reserveDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((dl - today) / 86400000);
  if (diff < 0) return 'over';
  if (diff <= 2) return 'warn';
  return 'ok';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function deadlineDiffText(reserveDate, postStatus) {
  if (!reserveDate) return { text:'예약일 미입력', cls:'none' };
  if (postStatus === 'posted') return { text:'포스팅 완료 ✓', cls:'ok' };
  const dl = getDeadline(reserveDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((dl - today) / 86400000);
  const dlStr = `${dl.getMonth()+1}/${dl.getDate()}까지`;
  if (diff < 0) return { text:`${dlStr} (${Math.abs(diff)}일 초과)`, cls:'over' };
  if (diff === 0) return { text:`${dlStr} (오늘 마감!)`, cls:'warn' };
  if (diff <= 2) return { text:`${dlStr} (D-${diff})`, cls:'warn' };
  return { text:`${dlStr} (D-${diff})`, cls:'ok' };
}

function getBranchStatus(branch) {
  const filled = state[branch].bloggers.filter(isFilled).length;
  if (filled === 0) return 'open';
  if (filled >= 5) return 'full';
  return 'partial';
}

function hasOverdue(branch) {
  return state[branch].bloggers.some(bl => {
    if (!bl.reserveDate) return false;
    if (bl.postStatus === 'posted') return false;
    const dl = getDeadline(bl.reserveDate);
    return dl < new Date();
  });
}

function renderAll() {
  const grid = document.getElementById('branchesGrid');
  grid.innerHTML = '';
  branches.forEach((branch, idx) => {
    grid.appendChild(buildCard(branch, idx));
  });
  updateStats();
  applyFilter();
}

function buildCard(branch, idx) {
  const bs = state[branch];
  const status = getBranchStatus(branch);
  const filledCount = bs.bloggers.filter(isFilled).length;
  const isOpen = openCards.has(branch);
  const overdue = hasOverdue(branch);

  const badgeMap = {
    open: '<span class="badge badge-open">모집 전</span>',
    partial: '<span class="badge badge-partial">진행 중</span>',
    full: '<span class="badge badge-full">모집 완료</span>'
  };

  const miniDots = bs.bloggers.map((bl,i) =>
    `<div class="mini-dot ${isFilled(bl)?'filled':''}"></div>`
  ).join('');

  // Build blogger rows
  let bloggerRows = '';
  bs.bloggers.forEach((bl, ti) => {
    const filled = isFilled(bl);
    const dl = deadlineDiffText(bl.reserveDate, bl.postStatus);
    const statusLabels = { none:'미확인', posted:'완료 ✓', overdue:'기한초과' };
    const dStat = deadlineStatus(bl.reserveDate, bl.postStatus);
    let psBtnCls = 'none';
    if (bl.postStatus === 'posted') psBtnCls = 'posted';
    else if (dStat === 'over') psBtnCls = 'overdue';

    const psLabel = bl.postStatus === 'posted' ? '완료 ✓' : (dStat === 'over' ? '기한초과' : '미확인');

    bloggerRows += `
    <tr>
      <td><div class="team-num ${filled?'active':''}">${ti+1}</div></td>
      <td>
        <input class="cell-input" type="text" placeholder="블로거명" value="${esc(bl.name)}"
          oninput="updateBlogger('${branch}',${ti},'name',this.value)">
      </td>
      <td>
        <input class="cell-input" type="text" placeholder="블로그 ID / URL" value="${esc(bl.blog)}"
          oninput="updateBlogger('${branch}',${ti},'blog',this.value)">
      </td>
      <td>
        <input class="cell-input" type="text" placeholder="연락처" value="${esc(bl.phone)}"
          oninput="updateBlogger('${branch}',${ti},'phone',this.value)" style="width:110px">
      </td>
      <td>
        <input class="cell-input date-input" type="date" value="${bl.reserveDate||''}"
          onchange="updateBlogger('${branch}',${ti},'reserveDate',this.value)" style="width:130px">
        <div class="deadline-row">
          <span class="deadline-label">기한:</span>
          <span class="deadline-val ${dl.cls}">${dl.text}</span>
        </div>
      </td>
      <td>
        <div class="link-wrap">
          <input class="cell-input" type="url" placeholder="포스팅 링크 붙여넣기" value="${esc(bl.postLink)}"
            oninput="updateBlogger('${branch}',${ti},'postLink',this.value)" style="min-width:0;flex:1">
          ${bl.postLink ? `<a class="link-btn" href="${esc(bl.postLink)}" target="_blank" title="링크 열기">↗</a>` : `<span class="link-btn" style="cursor:default;opacity:.3">↗</span>`}
          <button class="post-status-btn ${psBtnCls}"
            onclick="togglePostStatus('${branch}',${ti})">${psLabel}</button>
        </div>
      </td>
    </tr>`;
  });

  const card = document.createElement('div');
  card.className = `branch-card${overdue?' overdue-card':''}`;
  card.dataset.branch = branch;
  card.dataset.status = status;
  card.dataset.overdue = overdue ? 'true' : 'false';

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard('${branch}')">
      <div class="card-header-left">
        <span class="branch-idx">#${String(idx+1).padStart(2,'0')}</span>
        <span class="branch-name">${branch}</span>
        ${badgeMap[status]}
      </div>
      <div class="card-header-right">
        <div class="progress-mini">
          <div class="mini-dots">${miniDots}</div>
          <span class="mini-count">${filledCount}/5</span>
        </div>
        <span class="chevron ${isOpen?'open':''}">▼</span>
      </div>
    </div>
    <div class="card-body ${isOpen?'open':''}">
      <table class="blogger-table">
        <thead>
          <tr>
            <th>#</th>
            <th>블로거명</th>
            <th>블로그 ID / URL</th>
            <th>연락처</th>
            <th>예약일 &amp; 포스팅 기한 (+7일)</th>
            <th>포스팅 링크 &amp; 상태</th>
          </tr>
        </thead>
        <tbody>${bloggerRows}</tbody>
      </table>
      <div class="card-footer">
        <button class="reset-btn" onclick="resetBranch('${branch}')">이 지점 초기화</button>
      </div>
    </div>
  `;
  return card;
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCard(branch) {
  if (openCards.has(branch)) openCards.delete(branch);
  else openCards.add(branch);
  const card = document.querySelector(`[data-branch="${branch}"]`);
  if (!card) return;
  const body = card.querySelector('.card-body');
  const chev = card.querySelector('.chevron');
  body.classList.toggle('open', openCards.has(branch));
  chev.classList.toggle('open', openCards.has(branch));
}

function updateBlogger(branch, idx, field, value) {
  state[branch].bloggers[idx][field] = value;
  saveState();
  // re-render just this card's header & mini dots
  const card = document.querySelector(`[data-branch="${branch}"]`);
  if (!card) return;
  const bs = state[branch];
  const status = getBranchStatus(branch);
  const filledCount = bs.bloggers.filter(isFilled).length;
  const overdue = hasOverdue(branch);

  card.dataset.status = status;
  card.dataset.overdue = overdue ? 'true' : 'false';

  // update mini dots
  const dots = card.querySelectorAll('.mini-dot');
  bs.bloggers.forEach((bl,i) => { dots[i] && dots[i].classList.toggle('filled', isFilled(bl)); });
  // update mini count
  const mc = card.querySelector('.mini-count');
  if (mc) mc.textContent = `${filledCount}/5`;
  // update badge
  const badgeMap = {
    open:'<span class="badge badge-open">모집 전</span>',
    partial:'<span class="badge badge-partial">진행 중</span>',
    full:'<span class="badge badge-full">모집 완료</span>'
  };
  const hl = card.querySelector('.card-header-left');
  const existBadge = hl.querySelector('.badge');
  if (existBadge) existBadge.outerHTML = badgeMap[status];
  // update team num highlight
  const nums = card.querySelectorAll('.team-num');
  bs.bloggers.forEach((bl,i) => { nums[i] && nums[i].classList.toggle('active', isFilled(bl)); });

  // update deadline display for this blogger's row
  const rows = card.querySelectorAll('.blogger-table tbody tr');
  if (rows[idx]) {
    const dl = deadlineDiffText(bs.bloggers[idx].reserveDate, bs.bloggers[idx].postStatus);
    const dlEl = rows[idx].querySelector('.deadline-val');
    if (dlEl) { dlEl.textContent = dl.text; dlEl.className = `deadline-val ${dl.cls}`; }
    // update link button
    const linkWrap = rows[idx].querySelector('.link-wrap');
    if (linkWrap && field === 'postLink') {
      const oldBtn = linkWrap.querySelector('.link-btn');
      if (oldBtn) {
        if (value) {
          oldBtn.outerHTML = `<a class="link-btn" href="${esc(value)}" target="_blank" title="링크 열기">↗</a>`;
        } else {
          oldBtn.outerHTML = `<span class="link-btn" style="cursor:default;opacity:.3">↗</span>`;
        }
      }
    }
  }
  updateStats();
  applyFilter();
}

function togglePostStatus(branch, idx) {
  const bl = state[branch].bloggers[idx];
  bl.postStatus = bl.postStatus === 'posted' ? 'none' : 'posted';
  saveState();
  // re-render card body only
  openCards.add(branch);
  const card = document.querySelector(`[data-branch="${branch}"]`);
  if (card) {
    const newCard = buildCard(branch, branches.indexOf(branch));
    card.replaceWith(newCard);
  }
  updateStats();
  applyFilter();
}

function resetBranch(branch) {
  if (!confirm(`${branch}의 모든 체험단 데이터를 초기화할까요?`)) return;
  state[branch] = defaultBranch();
  saveState();
  const card = document.querySelector(`[data-branch="${branch}"]`);
  if (card) {
    const newCard = buildCard(branch, branches.indexOf(branch));
    card.replaceWith(newCard);
  }
  updateStats();
  applyFilter();
}

function updateStats() {
  let open=0, partial=0, full=0, teams=0, overdue=0;
  branches.forEach(b => {
    const s = getBranchStatus(b);
    if (s==='open') open++;
    else if (s==='partial') partial++;
    else if (s==='full') full++;
    teams += state[b].bloggers.filter(isFilled).length;
    if (hasOverdue(b)) overdue++;
  });
  document.getElementById('stat-open').textContent = open;
  document.getElementById('stat-partial').textContent = partial;
  document.getElementById('stat-full').textContent = full;
  document.getElementById('stat-teams').textContent = teams;
  document.getElementById('stat-max').textContent = branches.length * 5;
  document.getElementById('stat-overdue').textContent = overdue;
}

function filterCards(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.branch-card').forEach(card => {
    const s = card.dataset.status;
    const od = card.dataset.overdue === 'true';
    let show = true;
    if (currentFilter === 'open' && s !== 'open') show = false;
    else if (currentFilter === 'partial' && s !== 'partial') show = false;
    else if (currentFilter === 'full' && s !== 'full') show = false;
    else if (currentFilter === 'overdue' && !od) show = false;
    card.classList.toggle('hidden', !show);
  });
}

function searchCards(query) {
  const q = query.trim().toLowerCase();
  document.querySelectorAll('.branch-card').forEach(card => {
    const branch = card.dataset.branch;
    let match = branch.toLowerCase().includes(q);
    if (!match && q) {
      const bs = state[branch];
      match = bs.bloggers.some(bl =>
        bl.name.toLowerCase().includes(q) || bl.blog.toLowerCase().includes(q) || bl.phone.includes(q)
      );
    }
    card.classList.toggle('hidden', !match && q !== '');
  });
}


// ── 공유 기능 ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportJSON() {
  const date = new Date().toISOString().slice(0,10);
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '한사발체험단_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 저장 완료! JSON 파일을 공유하세요.');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // 유효성 확인: branches 키 중 하나라도 있으면 OK
      const hasKey = branches.some(b => imported[b]);
      if (!hasKey) throw new Error('invalid');
      state = imported;
      // 누락된 지점 보완
      branches.forEach(b => {
        if (!state[b]) state[b] = defaultBranch();
        while (state[b].bloggers.length < 5) state[b].bloggers.push(defaultBlogger());
        state[b].bloggers.forEach(bl => { if (!bl.postStatus) bl.postStatus = 'none'; });
      });
      saveState();
      openCards.clear();
      renderAll();
      showToast('📂 불러오기 완료! ' + branches.filter(b => state[b].bloggers.some(isFilled)).length + '개 지점 데이터 복원됨');
    } catch(err) {
      showToast('⚠️ 파일 형식이 올바르지 않습니다.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportCSV() {
  const rows = [['지점명','번호','블로거명','블로그ID/URL','연락처','예약일','포스팅기한','포스팅링크','포스팅상태']];
  branches.forEach(b => {
    state[b].bloggers.forEach((bl, i) => {
      const dl = bl.reserveDate ? new Date(bl.reserveDate) : null;
      if (dl) dl.setDate(dl.getDate() + 7);
      const dlStr = dl ? (dl.getMonth()+1) + '/' + dl.getDate() : '';
      rows.push([b, i+1, bl.name, bl.blog, bl.phone, bl.reserveDate, dlStr, bl.postLink, bl.postStatus]);
    });
  });
  const csv = rows.map(r => r.map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '한사발체험단.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📊 CSV 내보내기 완료!');
}
// ────────────────────────────────────────────────────────────

loadState();
renderAll();
</script>
